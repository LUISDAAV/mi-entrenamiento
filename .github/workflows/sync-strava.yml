name: Sync Strava Data

on:
  schedule:
    - cron: '0 11 * * 1'  # Cada lunes a las 8am Argentina (UTC-3)
  workflow_dispatch:       # También permite correrlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Refresh Strava token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "new_refresh=$NEW_REFRESH" >> $GITHUB_OUTPUT

      - name: Update refresh token secret
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh secret set STRAVA_REFRESH_TOKEN --body "${{ steps.token.outputs.new_refresh }}" --repo ${{ github.repository }}

      - name: Fetch Strava activities
        run: |
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://www.strava.com/api/v3/athlete/activities?per_page=60" \
            -o ./activities.json

      - name: Fetch athlete profile
        run: |
          curl -s -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            "https://www.strava.com/api/v3/athlete" \
            -o ./athlete.json

      - name: Add metadata
        run: |
          python3 -c "
          import json, datetime
          meta = {
            'last_sync': datetime.datetime.utcnow().isoformat() + 'Z',
            'generated_by': 'GitHub Actions'
          }
          with open('meta.json', 'w') as f:
            json.dump(meta, f)
          "

      - name: Commit and push
        run: |
          git config user.name "Strava Sync Bot"
          git config user.email "bot@github.com"
          git add activities.json athlete.json meta.json
          git diff --staged --quiet || git commit -m "sync: Strava data $(date +'%Y-%m-%d')"
          git push
